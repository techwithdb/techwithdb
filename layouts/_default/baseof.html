<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="base-url" content="{{ "/" | relURL }}">

  <title>{{ if .IsHome }}{{ .Site.Title }} — AWS &amp; DevOps Tutorials{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . | plainify | truncate 155 }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <meta property="og:type"        content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:title"       content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  <meta property="og:site_name"   content="{{ .Site.Title }}">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ .Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/feed.xml" | absURL }}">
  <link rel="icon" href="{{ "images/favicon.svg" | relURL }}" type="image/svg+xml">

  <!-- Fonts: Sora + Fira Code (matching TechWithDB design) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

  {{ if .Site.Params.googleAnalytics }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.googleAnalytics }}"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ .Site.Params.googleAnalytics }}');</script>
  {{ end }}
</head>
<body>

  {{- partial "header.html" . -}}

  {{ partial "head.html" . }}

  <div class="reading-bar" aria-hidden="true">
    <div class="reading-bar-fill"></div>
  </div>

  <main id="main">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  <!-- Back to top -->
  <button class="btt" id="btt" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Search overlay -->
  <div class="search-overlay" id="searchOverlay" role="dialog" aria-label="Site search" aria-modal="true">
    <div class="search-box">
      <div class="search-row">
        <i class="fas fa-search"></i>
        <input type="search" id="searchInput" placeholder="Search tutorials, AWS, DevOps…" autocomplete="off" spellcheck="false">
        <span class="search-hint">ESC to close</span>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-empty">Start typing to search…</div>
      </div>
    </div>
  </div>

  <!-- Mobile drawer -->
  <nav class="mobile-drawer" id="mobileDrawer" aria-label="Mobile navigation">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.08)">
      <span style="font-size:1.1rem;font-weight:800;color:#fff"><span style="color:var(--cyan)">&lt;</span>TechWith<span style="color:var(--cyan)">DB</span><span style="color:var(--cyan)">/&gt;</span></span>
      <button id="drawerClose" style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:rgba(255,255,255,.5)" aria-label="Close">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <a href="{{ "/" | relURL }}"><i class="fas fa-home"></i> Home</a>
    <a href="{{ "/aws/" | relURL }}"><i class="fab fa-aws"></i> AWS Services</a>
    <a href="{{ "/devops/" | relURL }}"><i class="fas fa-infinity"></i> DevOps Tools</a>
    <a href="{{ "/interview-questions/" | relURL }}"><i class="fas fa-comments"></i> Interview Q&amp;A</a>
    <a href="{{ "/blog/" | relURL }}"><i class="fas fa-pen-nib"></i> Blog</a>
    <a href="{{ "/contact/" | relURL }}"><i class="fas fa-envelope"></i> Contact</a>
    <div class="mobile-form-cta">
      <a href="{{ .Site.Params.googleFormURL }}" target="_blank" rel="noopener" class="btn btn-primary" style="width:100%;justify-content:center;display:flex;gap:8px">
        <i class="fab fa-google"></i> Submit a Question
      </a>
    </div>
  </nav>

  <!-- highlight.js for syntax highlighting — light theme -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
  <script defer>document.addEventListener('DOMContentLoaded',()=>{if(window.hljs){hljs.configure({ignoreUnescapedHTML:true});hljs.highlightAll();}})</script>

  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>

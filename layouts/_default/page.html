{{ define "main" }}
<div class="wrap">
  {{- partial "breadcrumb.html" . -}}
  <div class="wrap-sm" style="padding:2rem 0 4rem">
    <h1 style="margin-bottom:.75rem">{{ .Title }}</h1>
    {{ with .Description }}<p style="font-size:1.1rem;color:var(--ink-2);margin-bottom:2rem">{{ . }}</p>{{ end }}
    <div class="prose">{{ .Content }}</div>
  </div>
</div>
{{ end }}
